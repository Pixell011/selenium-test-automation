name: QA Automation Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      # Get the repository code so the workflow can access tests and configs.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Python for a stable and reproducible test runtime.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install Google Chrome Stable on Ubuntu runner for Selenium execution.
      - name: Install Google Chrome Stable
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/googlechrome-linux-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/googlechrome-linux-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      # Upgrade pip before installing project dependencies.
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # Install all Python dependencies required by the automation framework.
      - name: Install requirements
        run: pip install -r requirements.txt

      # Ensure report folders exist before tests generate html and screenshots.
      - name: Create report directories
        run: mkdir -p reports/screenshots

      # Run the test suite in headless mode (configured in conftest.py).
      # pytest.ini will also generate the HTML report under reports/report.html.
      - name: Run pytest
        run: python -m pytest -q

      # Upload report files even if tests fail, so results are always available.
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-and-screenshots
          path: |
            reports/report.html
            reports/screenshots/
