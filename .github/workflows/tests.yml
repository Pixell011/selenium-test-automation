name: QA Automation Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      # Get the repository code so the workflow can access tests and configs.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Python 3.11 for a stable and reproducible test runtime.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install Google Chrome on the runner for Selenium browser execution.
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      # Upgrade pip before installing project dependencies.
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # Install all Python dependencies required by the automation framework.
      - name: Install requirements
        run: pip install -r requirements.txt

      # Run the test suite in headless mode (configured in conftest.py).
      # pytest.ini will also generate the HTML report under reports/report.html.
      - name: Run pytest
        run: python -m pytest -q
